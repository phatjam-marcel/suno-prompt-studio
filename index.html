// ── Claude API ───────────────────────────────────────────────
async function generatePromptsForGenre(genre, apiKey) {
  const system = `You are an expert music producer and Suno AI prompt engineer.
Generate exactly 20 comprehensive, unique music prompts for the genre provided.
Each prompt must be ready to paste directly into Suno and must include ALL of the following in a natural, flowing description:
- Tempo / BPM (e.g. "120 BPM", "slow 70 BPM", "uptempo 145 BPM")
- Specific instruments (name real instruments, effects, processing where relevant)
- Mood & atmosphere (vivid, evocative language)
- Vocal style directions (gender, tone, technique e.g. "breathy female alto", "gruff male baritone", or "instrumental, no vocals")
- Song structure hints (e.g. "builds from sparse intro through anthemic chorus to stripped-back outro", "single continuous movement")

RULES:
- Each prompt should be 3-5 sentences long
- Make every prompt distinct — vary the sub-genre, mood, instrumentation
- Write in the descriptive style Suno understands best
- Return ONLY a valid JSON array of 20 strings. No keys, no markdown fences, no preamble.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-opus-4-5",
      max_tokens: 4000,
      system,
      messages: [{ role: "user", content: `Generate 20 Suno prompts for the genre: ${genre}` }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  const text = (data.content || []).map(b => b.text || "").join("");
  const clean = text.replace(/```json|```/g, "").trim();
  const parsed = JSON.parse(clean);
  return Array.isArray(parsed) ? parsed : [];
}

// ── Lyrics Generator ─────────────────────────────────────────
const LYRICS_USAGE_KEY = "suno-lyrics-usage-v1";

function loadLyricsUsage() {
  try { return JSON.parse(localStorage.getItem(LYRICS_USAGE_KEY) || "[]"); }
  catch { return []; }
}
function saveLyricsUsage(data) {
  try { localStorage.setItem(LYRICS_USAGE_KEY, JSON.stringify(data)); }
  catch(e) {}
}
function getLyricsUsageKey(topic, genre, mood) {
  return [topic, genre, mood].map(s => (s||"").toLowerCase().trim()).join("|");
}
function incrementLyricsUsage(topic, genre, mood) {
  const history = loadLyricsUsage();
  const key = getLyricsUsageKey(topic, genre, mood);
  const existing = history.find(h => h.key === key);
  if (existing) { existing.count++; existing.lastUsed = Date.now(); }
  else { history.unshift({ key, topic, genre, mood, count: 1, lastUsed: Date.now() }); }
  saveLyricsUsage(history);
  return existing ? existing.count : 1;
}
function getLyricsUsageCount(topic, genre, mood) {
  const key = getLyricsUsageKey(topic, genre, mood);
  const history = loadLyricsUsage();
  const entry = history.find(h => h.key === key);
  return entry ? entry.count : 0;
}

async function generateLyricsWithGemini(prompt, apiKey) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.9, maxOutputTokens: 1200 }
      })
    }
  );
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error("Gemini: " + (err?.error?.message || res.statusText));
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

async function generateLyricsWithGroq(prompt, apiKey) {
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      messages: [{ role: "user", content: prompt }],
      temperature: 0.9,
      max_tokens: 1200
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error("Groq: " + (err?.error?.message || res.statusText));
  }
  const data = await res.json();
  return data.choices?.[0]?.message?.content || "";
}

function buildLyricsPrompt(topic, genre, mood, primaryLang, wholeLang, insertionLang, notes, songIndex, total) {
  const langInstruction = wholeLang.trim()
    ? `Write the ENTIRE song in ${wholeLang}. Do not use any other language.`
    : insertionLang.trim()
      ? `Write primarily in ${primaryLang}. Naturally weave in ${insertionLang} — subtle and authentic to the genre.`
      : `Write in ${primaryLang || "English"}.`;
  const uniqueness = total > 1
    ? `This is song ${songIndex + 1} of ${total}. Make it DISTINCTLY different — different perspective, imagery, and feel.`
    : "";
  return `You are a professional songwriter specializing in ${genre || "contemporary"} music.

Write a complete song with this exact structure and labels:
[Verse 1]
[Chorus]
[Verse 2]
[Chorus]
[Verse 3]
[Chorus]
[Outro]

Requirements:
- Topic/Theme: ${topic || "open"}
- Genre: ${genre || "contemporary"}
- Mood/Vibe: ${mood || "expressive"}
- Each verse: 4+ lines, authentic to the genre
- Chorus: 4-6 lines, hook-worthy, repeated identically each time
- Outro: 2-4 lines, satisfying resolution
- ${langInstruction}
${notes ? `- Additional direction: ${notes}` : ""}
${uniqueness}

Return ONLY the lyrics with section labels. No explanations. Start directly with [Verse 1].`;
}

function LyricsSongCard({ song, index, onCopy, copiedIndex }) {
  const lines = song.lyrics.split("\n");
  const isCopied = copiedIndex === index;

  const renderLyrics = () => {
    return lines.map((line, i) => {
      const trimmed = line.trim();
      if (!trimmed) return <div key={i} style={{height:"8px"}}/>;
      if (trimmed.startsWith("[") && trimmed.endsWith("]")) {
        return <div key={i} style={{fontSize:"9px",color:"#d4a017",letterSpacing:"2px",textTransform:"uppercase",marginTop:"18px",marginBottom:"4px",fontFamily:"'DM Mono',monospace"}}>{trimmed}</div>;
      }
      return <div key={i} style={{fontSize:"14px",lineHeight:1.8,color:"#ccd8e4",fontStyle:"italic",fontFamily:"Georgia,serif"}}>{trimmed}</div>;
    });
  };

  const usageCount = getLyricsUsageCount(song.topic, song.genre, song.mood);

  return (
    <div style={{background:"#162030",border:"1px solid #1e2535",borderRadius:"8px",overflow:"hidden",marginBottom:"12px"}}>
      <div style={{padding:"12px 16px",borderBottom:"1px solid #1e2535",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"10px",flexWrap:"wrap"}}>
        <div style={{fontSize:"11px",color:"#546a80",fontFamily:"'DM Mono',monospace",letterSpacing:"0.5px"}}>
          Song {index + 1}{song.genre ? ` · ${song.genre}` : ""}{song.mood ? ` · ${song.mood}` : ""}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"8px",flexShrink:0}}>
          {usageCount > 0
            ? <span style={{fontSize:"10px",padding:"2px 8px",background:"#d4a01722",color:"#d4a017",border:"1px solid #d4a01744",borderRadius:"99px",fontFamily:"'DM Mono',monospace",letterSpacing:"1px"}}>♺ {usageCount}x</span>
            : <span style={{fontSize:"10px",padding:"2px 8px",background:"#22c55e11",color:"#22c55e",border:"1px solid #22c55e33",borderRadius:"99px",fontFamily:"'DM Mono',monospace",letterSpacing:"1px"}}>● new</span>
          }
          <button onClick={()=>onCopy(index)} style={{
            padding:"6px 12px",borderRadius:"5px",fontSize:"11px",
            background:isCopied?"#d4a01722":"#1a2a3e",
            color:isCopied?"#d4a017":"#6b8099",
            border:`1px solid ${isCopied?"#d4a017":"#243345"}`,
            cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s",whiteSpace:"nowrap"
          }}>{isCopied ? "✓ Copied" : "Copy"}</button>
        </div>
      </div>
      <div style={{padding:"16px 18px"}}>
        {renderLyrics()}
      </div>
    </div>
  );
}

function LyricsUsageHistory() {
  const [open, setOpen] = useState(false);
  const history = loadLyricsUsage();
  if (history.length === 0) return null;
  return (
    <div style={{background:"#162030",border:"1px solid #1e2535",borderRadius:"8px",marginBottom:"24px",overflow:"hidden"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:"100%",background:"none",border:"none",padding:"12px 16px",
        display:"flex",alignItems:"center",justifyContent:"space-between",
        cursor:"pointer",color:"#6b8099",fontFamily:"'DM Mono',monospace",
        fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase"
      }}>
        <span>♺ Usage History <span style={{background:"#d4a01722",color:"#d4a017",border:"1px solid #d4a01744",borderRadius:"99px",padding:"1px 7px",marginLeft:"6px"}}>{history.length}</span></span>
        <span>{open?"▲":"▼"}</span>
      </button>
      {open && (
        <div style={{borderTop:"1px solid #1e2535",maxHeight:"220px",overflowY:"auto"}}>
          {history.map((h,i)=>(
            <div key={i} style={{padding:"10px 16px",borderBottom:"1px solid #0e1117",display:"flex",alignItems:"center",gap:"10px"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:"13px",fontStyle:"italic",color:"#ccd8e4",fontFamily:"Georgia,serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.topic||"(no topic)"}</div>
                <div style={{fontSize:"10px",color:"#3a4f63",fontFamily:"'DM Mono',monospace",marginTop:"2px"}}>{[h.genre,h.mood].filter(Boolean).join(" · ")||"no genre/mood"}</div>
              </div>
              <span style={{fontSize:"11px",color:"#d4a017",background:"#d4a01722",border:"1px solid #d4a01744",borderRadius:"99px",padding:"2px 9px",fontFamily:"'DM Mono',monospace",flexShrink:0}}>{h.count}x</span>
            </div>
          ))}
          <div style={{padding:"8px 16px",borderTop:"1px solid #1e2535",textAlign:"right"}}>
            <button onClick={()=>{if(confirm("Clear all lyrics usage history?")){localStorage.removeItem(LYRICS_USAGE_KEY);window.location.reload();}}} style={{background:"none",border:"1px solid #ef444433",borderRadius:"4px",color:"#ef444466",fontSize:"10px",padding:"4px 10px",cursor:"pointer",fontFamily:"'DM Mono',monospace",letterSpacing:"1px",textTransform:"uppercase"}}>Clear</button>
          </div>
        </div>
      )}

  );
}

function LyricsView({ geminiKey, groqKey, lyricsProvider, onUpdateKeys }) {
  const [topic, setTopic] = useState("");
  const [genre, setGenre] = useState("");
  const [mood, setMood] = useState("");
  const [songCount, setSongCount] = useState(1);
  const [primaryLang, setPrimaryLang] = useState("English");
  const [wholeLang, setWholeLang] = useState("");
  const [insertionLang, setInsertionLang] = useState("");
  const [notes, setNotes] = useState("");
  const [songs, setSongs] = useState([]);
  const [generating, setGenerating] = useState(false);
  const [status, setStatus] = useState("");
  const [statusType, setStatusType] = useState("");
  const [progress, setProgress] = useState(0);
  const [copiedIndex, setCopiedIndex] = useState(null);
  const [showSetup, setShowSetup] = useState(false);
  const [, forceUpdate] = useState(0);

  const hasKey = lyricsProvider === "gemini" ? !!geminiKey :
                 lyricsProvider === "groq" ? !!groqKey :
                 !!(geminiKey || groqKey);

  const callAI = async (prompt) => {
    if (lyricsProvider === "gemini") return generateLyricsWithGemini(prompt, geminiKey);
    if (lyricsProvider === "groq") return generateLyricsWithGroq(prompt, groqKey);
    try { return await generateLyricsWithGemini(prompt, geminiKey); }
    catch(e) { console.warn("Gemini failed, trying Groq"); return generateLyricsWithGroq(prompt, groqKey); }
  };

  const handleGenerate = async () => {
    if (!topic.trim()) { setStatus("Please enter a song topic."); setStatusType("error"); return; }
    if (!hasKey) { setShowSetup(true); return; }
    setGenerating(true); setSongs([]); setStatus(""); setProgress(5);
    const results = [];
    for (let i = 0; i < songCount; i++) {
      setStatus(`Composing song ${i+1} of ${songCount}…`); setStatusType("");
      setProgress(10 + (i / songCount) * 80);
      const prompt = buildLyricsPrompt(topic, genre, mood, primaryLang, wholeLang, insertionLang, notes, i, songCount);
      try {
        const lyrics = await callAI(prompt);
        results.push({ lyrics, topic, genre, mood });
      } catch(e) {
        results.push({ lyrics: `[Error: ${e.message}]`, topic, genre, mood, error: true });
      }
      if (i < songCount - 1) await new Promise(r => setTimeout(r, 800));
    }
    setSongs(results); setProgress(100); setGenerating(false);
    setStatus(`✓ ${songCount} song${songCount>1?"s":""} generated.`); setStatusType("success");
  };

  const handleCopy = (index) => {
    const song = songs[index];
    try { navigator.clipboard.writeText(song.lyrics); } catch {}
    incrementLyricsUsage(song.topic, song.genre, song.mood);
    setCopiedIndex(index);
    forceUpdate(n => n + 1);
    setTimeout(() => setCopiedIndex(null), 2000);
  };

  const handleCopyAll = () => {
    const all = songs.map((s,i) => `=== SONG ${i+1} ===\n\n${s.lyrics}`).join("\n\n\n");
    try { navigator.clipboard.writeText(all); } catch {}
    songs.forEach(s => incrementLyricsUsage(s.topic, s.genre, s.mood));
    forceUpdate(n => n + 1);
    setStatus("✓ All songs copied."); setStatusType("success");
  };

  const inputStyle = {
    width:"100%", background:"#162030", border:"1px solid #1e2535",
    borderRadius:"6px", color:"#ccd8e4", padding:"9px 12px",
    fontSize:"13px", fontFamily:"inherit"
  };
  const labelStyle = {
    fontSize:"10px", color:"#546a80", letterSpacing:"2px",
    textTransform:"uppercase", display:"block", marginBottom:"6px",
    fontFamily:"'DM Mono',monospace"
  };
  const countBtnStyle = (active) => ({
    width:"38px", height:"38px", borderRadius:"5px",
    background: active ? "#d4a01722" : "#1a2a3e",
    color: active ? "#d4a017" : "#6b8099",
    border: `1px solid ${active ? "#d4a017" : "#243345"}`,
    cursor:"pointer", fontSize:"13px", fontFamily:"inherit"
  });

  return (
    <div style={{maxWidth:"680px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"20px",flexWrap:"wrap",gap:"10px"}}>
        <div>
          <h2 style={{fontSize:"22px",fontWeight:700,color:"#e8f0f8",letterSpacing:"-0.5px",marginBottom:"4px"}}>Lyrics Generator</h2>
          <p style={{color:"#546a80",fontSize:"13px",lineHeight:1.6}}>Generate full songs: 3 verses · chorus · outro · free AI</p>
        </div>
        <button onClick={()=>setShowSetup(s=>!s)} style={{
          padding:"7px 14px",borderRadius:"5px",background:"#1a2a3e",
          color: hasKey?"#d4a017":"#f59e0b",
          border:`1px solid ${hasKey?"#d4a01744":"#f59e0b44"}`,
          cursor:"pointer",fontSize:"11px",fontFamily:"'DM Mono',monospace",letterSpacing:"1px"
        }}>{hasKey ? "✓ AI Keys" : "⚠ Set AI Keys"}</button>
      </div>

      {showSetup && (
        <LyricsApiSetup
          geminiKey={geminiKey} groqKey={groqKey} provider={lyricsProvider}
          onSave={(g,q,p) => { onUpdateKeys(g,q,p); setShowSetup(false); }}
        />
      )}

      <LyricsUsageHistory key={songs.length} />

      {/* Form */}
      <div style={{background:"#162030",border:"1px solid #1e2535",borderRadius:"8px",padding:"22px",marginBottom:"20px"}}>
        <div style={{marginBottom:"16px"}}>
          <label style={labelStyle}>Song Topic / Theme</label>
          <input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="e.g. a midnight train journey, lost love…" style={inputStyle}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"16px"}}>
          <div>
            <label style={labelStyle}>Genre</label>
            <input value={genre} onChange={e=>setGenre(e.target.value)} placeholder="e.g. Bossa Nova, Afrobeats…" style={inputStyle}/>
          </div>
          <div>
            <label style={labelStyle}>Mood / Vibe</label>
            <input value={mood} onChange={e=>setMood(e.target.value)} placeholder="e.g. melancholic, euphoric…" style={inputStyle}/>
          </div>
        </div>
        <div style={{marginBottom:"16px"}}>
          <label style={labelStyle}>Number of Songs</label>
          <div style={{display:"flex",gap:"6px"}}>
            {[1,2,3,4,5].map(n=>(
              <button key={n} onClick={()=>setSongCount(n)} style={countBtnStyle(songCount===n)}>{n}</button>
            ))}
          </div>
        </div>
        <div style={{borderTop:"1px solid #1e2535",paddingTop:"16px",marginBottom:"16px"}}>
          <div style={{fontSize:"10px",color:"#3a4f63",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:"12px"}}>Language Settings</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"12px"}}>
            <div>
              <label style={labelStyle}>Primary Language</label>
              <input value={primaryLang} onChange={e=>setPrimaryLang(e.target.value)} placeholder="English" style={inputStyle}/>
            </div>
            <div>
              <label style={labelStyle}>Whole Song In (optional)</label>
              <input value={wholeLang} onChange={e=>setWholeLang(e.target.value)} placeholder="e.g. Afrikaans, Spanish…" style={inputStyle}/>
            </div>
          </div>
          <div style={{marginBottom:"12px"}}>
            <label style={labelStyle}>Language Insertions (optional)</label>
            <input value={insertionLang} onChange={e=>setInsertionLang(e.target.value)} placeholder="e.g. a few Portuguese phrases, one Spanish line per chorus…" style={inputStyle}/>
          </div>
        </div>
        <div style={{marginBottom:"16px"}}>
          <label style={labelStyle}>Additional Notes (optional)</label>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3}
            placeholder="e.g. inspired by João Gilberto, avoid clichés, include a bridge…"
            style={{...inputStyle, resize:"vertical", lineHeight:1.6}}/>
        </div>

        {generating && (
          <div style={{height:"3px",background:"#1e2f42",borderRadius:"2px",marginBottom:"10px",overflow:"hidden"}}>
            <div style={{height:"100%",background:"#d4a017",borderRadius:"2px",width:`${progress}%`,transition:"width 0.4s ease"}}/>
          </div>
        )}
        {status && (
          <div style={{fontSize:"12px",color:statusType==="error"?"#ef4444":statusType==="success"?"#22c55e":"#6b8099",marginBottom:"12px",fontFamily:"'DM Mono',monospace"}}>{status}</div>
        )}

        <div style={{display:"flex",gap:"10px"}}>
          <button onClick={handleGenerate} disabled={generating} style={{
            flex:1, padding:"11px", borderRadius:"7px",
            background:generating?"#1a2a3e":"#d4a017",
            color:generating?"#3a4f63":"#fff",
            border:"none", cursor:generating?"default":"pointer",
            fontSize:"13px", fontWeight:700, fontFamily:"inherit"
          }}>{generating ? "Generating…" : "✦ Generate Lyrics"}</button>
          {songs.length > 1 && (
            <button onClick={handleCopyAll} style={{
              padding:"11px 18px",borderRadius:"7px",background:"#1a2a3e",
              color:"#9db4c8",border:"1px solid #1e2d44",
              cursor:"pointer",fontSize:"12px",fontFamily:"inherit",fontWeight:600
            }}>Copy All</button>
          )}
        </div>
      </div>

      {/* Results */}
      {songs.length > 0 && (
        <div>
          <div style={{fontSize:"10px",color:"#3a4f63",letterSpacing:"2px",textTransform:"uppercase",fontFamily:"'DM Mono',monospace",marginBottom:"14px"}}>Generated Lyrics</div>
          {songs.map((s,i) => (
            <LyricsSongCard key={i} song={s} index={i} onCopy={handleCopy} copiedIndex={copiedIndex}/>
          ))}
        </div>
      )}
    </div>
  );
}

      <span style={{fontSize:"20px"}}>📲</span>

        <div style={{fontSize:"11px",color:"#546a80"}}>Add to your home screen for quick access</div>
      </div>

function ApiKeyModal({ onSave }) {
  const [key, setKey] = useState("");
  const [error, setError] = useState("");
  const [testing, setTesting] = useState(false);

  const handleSave = async () => {
    if (!key.trim().startsWith("sk-ant-")) {
      setError("That doesn't look like a valid Anthropic API key (should start with sk-ant-)");
      return;
    }
    setTesting(true); setError("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key":key.trim(),
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({ model:"claude-opus-4-5", max_tokens:10, messages:[{role:"user",content:"hi"}] })
      });
      if (res.status === 401) { setError("Invalid API key — please double-check it."); setTesting(false); return; }
      onSave(key.trim());
    } catch(e) { setError("Could not connect. Check your internet connection."); setTesting(false); }
  };

  return (
    <div style={{
      position:"fixed",inset:0,background:"#0f1923ee",display:"flex",
      alignItems:"center",justifyContent:"center",zIndex:999,padding:"20px"
    }}>
      <div style={{background:"#162030",border:"1px solid #1e2d44",borderRadius:"12px",padding:"36px",maxWidth:"480px",width:"100%"}}>
        <div style={{fontSize:"28px",marginBottom:"12px",textAlign:"center"}}>🎵</div>
        <h2 style={{fontSize:"20px",fontWeight:700,color:"#e8f0f8",textAlign:"center",marginBottom:"8px"}}>Welcome to MN MN Prompt Studio</h2>
        <p style={{fontSize:"13px",color:"#546a80",lineHeight:1.7,textAlign:"center",marginBottom:"24px"}}>
          To generate prompts, you need an Anthropic API key.<br/>
          Get one at <a href="https://console.anthropic.com" target="_blank" style={{color:"#d4a017"}}>console.anthropic.com</a>
          &nbsp;→ API Keys → Create Key.
        </p>
        <label style={{fontSize:"11px",color:"#6b8099",letterSpacing:"2px",textTransform:"uppercase",display:"block",marginBottom:"8px"}}>Your API Key</label>
        <input
          type="password" value={key} onChange={e=>setKey(e.target.value)}
          placeholder="sk-ant-api03-..."
          onKeyDown={e=>e.key==="Enter"&&handleSave()}
          style={{
            width:"100%",background:"#0f1923",border:"1px solid #1e2d44",
            borderRadius:"7px",color:"#e8f0f8",padding:"12px 14px",
            fontSize:"14px",fontFamily:"'DM Mono',monospace",marginBottom:"8px"
          }}
        />
        {error && <p style={{color:"#ef4444",fontSize:"12px",marginBottom:"10px"}}>{error}</p>}
        <p style={{fontSize:"11px",color:"#3a4f63",lineHeight:1.6,marginBottom:"20px"}}>
          🔒 Your key is saved only on this device in local storage. It is never sent anywhere except directly to Anthropic.
        </p>
        <button onClick={handleSave} disabled={!key.trim()||testing} style={{
          width:"100%",padding:"12px",borderRadius:"7px",
          background:!key.trim()?"#1a2a3e":"#d4a017",
          color:!key.trim()?"#3a4f63":"#fff",
          border:"none",cursor:!key.trim()?"default":"pointer",
          fontSize:"14px",fontWeight:700,fontFamily:"inherit"
        }}>{testing?"Verifying…":"Save & Continue"}</button>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("mn-api-key") || "");
  const [showApiModal, setShowApiModal] = useState(false);
  const [db, setDb] = useState(() => loadDB());
  const [view, setView] = useState("welcome");
  const [geminiKey, setGeminiKey] = useState(() => localStorage.getItem("lyrics-gemini-key") || "");
  const [groqKey, setGroqKey] = useState(() => localStorage.getItem("lyrics-groq-key") || "");
  const [lyricsProvider, setLyricsProvider] = useState(() => localStorage.getItem("lyrics-provider") || "gemini");
  const [activeGenre, setActiveGenre] = useState(null);
  const [genreInput, setGenreInput] = useState("");
  const [generating, setGenerating] = useState({});
  const [copiedText, setCopiedText] = useState(null);
  const [filter, setFilter] = useState("");
  const [error, setError] = useState("");
  const [installPrompt, setInstallPrompt] = useState(null);
  const [showInstallBanner, setShowInstallBanner] = useState(false);
  const [showImportModal, setShowImportModal] = useState(false);
  const [importStatus, setImportStatus] = useState("");

  // Capture PWA install prompt
  useEffect(() => {
    const handler = (e) => { e.preventDefault(); setInstallPrompt(e); setShowInstallBanner(true); };
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  const handleInstall = async () => {
    if (!installPrompt) return;
    installPrompt.prompt();
    const { outcome } = await installPrompt.userChoice;
    if (outcome === "accepted") { setInstallPrompt(null); setShowInstallBanner(false); }
  };

  const handleUpdateLyricsKeys = (g, q, p) => {
    localStorage.setItem("lyrics-gemini-key", g);
    localStorage.setItem("lyrics-groq-key", q);
    localStorage.setItem("lyrics-provider", p);
    setGeminiKey(g); setGroqKey(q); setLyricsProvider(p);
  };

  const genres = Object.keys(db).sort();
  // ── Export / Import ──────────────────────────────────────────
  const handleExport = () => {
    const exportData = {
      version: 1,
      exportedAt: new Date().toISOString(),
      genres: db,
      apiKey: apiKey || ""
    };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `mn-prompt-studio-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = (jsonText) => {
    try {
      const data = JSON.parse(jsonText);
      if (!data.genres || typeof data.genres !== "object") {
        setImportStatus("error:Invalid file — no genres found.");
        return;
      }
      const genreCount = Object.keys(data.genres).length;
      const promptCount = Object.values(data.genres).reduce((a,b)=>a+b.length,0);
      persistAndSet({ ...db, ...data.genres });
      if (data.apiKey && !apiKey) {
        localStorage.setItem("mn-api-key", data.apiKey);
        setApiKey(data.apiKey);
      }
      setImportStatus(`success:Imported ${genreCount} genres and ${promptCount} prompts successfully!`);
      setTimeout(() => { setShowImportModal(false); setImportStatus(""); }, 2000);
    } catch(e) {
      setImportStatus("error:Could not read file. Make sure it's a valid backup JSON.");
    }
  };

  const anyGenerating = Object.values(generating).some(Boolean);
  const totalPrompts = Object.values(db).reduce((a,b)=>a+b.length,0);

  const persistAndSet = (newDb) => { setDb(newDb); saveDB(newDb); };

  const handleSaveKey = (key) => {
    localStorage.setItem("mn-api-key", key);
    setApiKey(key); setShowApiModal(false);
  };

  const handleGenerate = async () => {
    if (!apiKey) { setShowApiModal(true); return; }
    const lines = genreInput.split("\n").map(l=>l.trim()).filter(Boolean);
    if (!lines.length) return;
    setError(""); setView("welcome");
    for (const genre of lines) {
      if (db[genre]) continue;
      setGenerating(prev=>({...prev,[genre]:true}));
      try {
        const prompts = await generatePromptsForGenre(genre, apiKey);
        setDb(prev => { const u={...prev,[genre]:prompts}; saveDB(u); return u; });
      } catch(e) {
        setError(`Error generating "${genre}": ${e.message}`);
      } finally {
        setGenerating(prev=>({...prev,[genre]:false}));
      }
    }
    setGenreInput("");
  };

  const handleRegenerate = async (genre) => {
    if (!apiKey) { setShowApiModal(true); return; }
    setGenerating(prev=>({...prev,[genre]:true}));
    try {
      const prompts = await generatePromptsForGenre(genre, apiKey);
      persistAndSet({...db,[genre]:prompts});
    } catch(e) { setError(e.message); }
    finally { setGenerating(prev=>({...prev,[genre]:false})); }
  };

  const handleDeleteGenre = (genre) => {
    const updated={...db}; delete updated[genre]; persistAndSet(updated);
    if (activeGenre===genre) { setActiveGenre(null); setView("welcome"); }
  };

  const openGenre = (genre) => { setActiveGenre(genre); setView("prompts"); setFilter(""); };

  const handleCopy = (text) => {
    try { navigator.clipboard.writeText(text); } catch {}
    setCopiedText(text);
    setTimeout(()=>setCopiedText(null), 2000);
  };

  const filteredPrompts = activeGenre
    ? (db[activeGenre]||[]).filter(p=>!filter||p.toLowerCase().includes(filter.toLowerCase()))
    : [];

  const genreCount = genreInput.split("\n").filter(l=>l.trim()).length;

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
      {showApiModal && <ApiKeyModal onSave={handleSaveKey}/>}
      {showImportModal && (
        <div style={{
          position:"fixed",inset:0,background:"#0f1923ee",display:"flex",
          alignItems:"center",justifyContent:"center",zIndex:999,padding:"20px"
        }}>
          <div style={{background:"#162030",border:"1px solid #243345",borderRadius:"12px",padding:"32px",maxWidth:"460px",width:"100%"}}>
            <h2 style={{fontSize:"18px",fontWeight:700,color:"#e8f0f8",marginBottom:"8px"}}>⬆ Import Backup</h2>
            <p style={{fontSize:"13px",color:"#546a80",lineHeight:1.7,marginBottom:"20px"}}>
              Select a backup JSON file previously exported from MN MN Prompt Studio. Your existing genres will be kept — imported genres will be added or updated.
            </p>
            <input type="file" accept=".json" onChange={e => {
              const file = e.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = ev => handleImport(ev.target.result);
              reader.readAsText(file);
            }} style={{
              width:"100%",background:"#0f1923",border:"1px solid #1e2f42",
              borderRadius:"7px",color:"#ccd8e4",padding:"10px 12px",
              fontSize:"13px",fontFamily:"inherit",marginBottom:"12px",cursor:"pointer"
            }}/>
            {importStatus && (
              <div style={{
                padding:"10px 14px",borderRadius:"6px",fontSize:"13px",marginBottom:"14px",
                background: importStatus.startsWith("success") ? "#22c55e11" : "#ef444411",
                border: `1px solid ${importStatus.startsWith("success") ? "#22c55e33" : "#ef444433"}`,
                color: importStatus.startsWith("success") ? "#22c55e" : "#ef4444"
              }}>{importStatus.replace(/^(success|error):/, "")}</div>
            )}
            <div style={{display:"flex",gap:"10px",justifyContent:"flex-end"}}>
              <button onClick={()=>{setShowImportModal(false);setImportStatus("");}} style={{
                padding:"9px 20px",borderRadius:"6px",background:"#1a2a3e",
                color:"#6b8099",border:"1px solid #243345",
                cursor:"pointer",fontSize:"13px",fontFamily:"inherit"
              }}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {showInstallBanner && (
        <InstallBanner onInstall={handleInstall} onDismiss={()=>setShowInstallBanner(false)}/>
      )}

      {/* Header */}
      <header style={{
        display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"0 24px",height:"54px",background:"#111d2b",
        borderBottom:"1px solid #141c2e",flexShrink:0
      }}>
        <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
          <div style={{
            width:"28px",height:"28px",borderRadius:"7px",fontSize:"14px",
            background:"linear-gradient(135deg,#d4a017,#264653)",
            display:"flex",alignItems:"center",justifyContent:"center"
          }}>🎵</div>
          <span style={{fontWeight:700,fontSize:"15px",color:"#e8f0f8",letterSpacing:"-0.3px"}}>
            MN MN Prompt Studio
          </span>
        </div>
        <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
          {anyGenerating && (
            <span style={{fontSize:"11px",color:"#f59e0b",letterSpacing:"1px",animation:"pulse 1s infinite"}}>● GENERATING…</span>
          )}
          <span style={{fontSize:"11px",color:"#3a4f63",letterSpacing:"1px"}}>
            {genres.length} GENRES · {totalPrompts} PROMPTS
          </span>
          {installPrompt && (
            <button onClick={handleInstall} style={{
              padding:"5px 12px",borderRadius:"5px",background:"#d4a01722",
              color:"#d4a017",border:"1px solid #d4a01744",
              cursor:"pointer",fontSize:"11px",fontFamily:"inherit",letterSpacing:"1px"
            }}>📲 Install App</button>
          )}
          <button onClick={handleExport} title="Export all genres & prompts as a backup file" style={{
            padding:"5px 12px",borderRadius:"5px",background:"#1a2a3e",
            color:"#6b8099",border:"1px solid #243345",
            cursor:"pointer",fontSize:"11px",fontFamily:"inherit",letterSpacing:"1px"
          }}>⬇ Export</button>
          <button onClick={()=>{setShowImportModal(true);setImportStatus("");}} style={{
            padding:"5px 12px",borderRadius:"5px",background:"#1a2a3e",
            color:"#6b8099",border:"1px solid #243345",
            cursor:"pointer",fontSize:"11px",fontFamily:"inherit",letterSpacing:"1px"
          }}>⬆ Import</button>
          <button onClick={()=>setShowApiModal(true)} style={{
            padding:"5px 12px",borderRadius:"5px",background:"#1a2a3e",
            color:apiKey?"#d4a017":"#f59e0b",
            border:`1px solid ${apiKey?"#d4a01744":"#f59e0b44"}`,
            cursor:"pointer",fontSize:"11px",fontFamily:"inherit",letterSpacing:"1px"
          }}>{apiKey ? "✓ API Key" : "⚠ Set API Key"}</button>
        </div>
      </header>

      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        {/* Sidebar */}
        <nav style={{
          width:"220px",flexShrink:0,background:"#111d2b",
          borderRight:"1px solid #141c2e",display:"flex",
          flexDirection:"column",overflowY:"auto"
        }}>
          <div style={{padding:"14px 12px 8px"}}>
            <button onClick={()=>setView("add")} style={{
              width:"100%",padding:"9px 12px",borderRadius:"7px",
              background:view==="add"?"#d4a017":"#1a2a3e",
              color:view==="add"?"#fff":"#9db4c8",
              border:`1px solid ${view==="add"?"#d4a017":"#243345"}`,
              cursor:"pointer",fontSize:"13px",fontWeight:600,
              fontFamily:"inherit",textAlign:"left",
              display:"flex",alignItems:"center",gap:"8px"
            }}>
              <span style={{fontSize:"16px",lineHeight:1}}>＋</span> Add Genres
            </button>
          </div>
          <div style={{padding:"6px 12px 0"}}>
            <button onClick={()=>setView("lyrics")} style={{
              width:"100%",padding:"9px 12px",borderRadius:"7px",
              background:view==="lyrics"?"#d4a017":"#1a2a3e",
              color:view==="lyrics"?"#fff":"#9db4c8",
              border:`1px solid ${view==="lyrics"?"#d4a017":"#243345"}`,
              cursor:"pointer",fontSize:"13px",fontWeight:600,
              fontFamily:"inherit",textAlign:"left",
              display:"flex",alignItems:"center",gap:"8px"
            }}>
              <span style={{fontSize:"16px",lineHeight:1}}>♪</span> Lyrics
            </button>
          </div>
          <div style={{padding:"8px 16px 4px",marginTop:"8px"}}>
            <span style={{fontSize:"10px",color:"#3a4f63",letterSpacing:"2px",textTransform:"uppercase"}}>Library</span>
          </div>
          {genres.length===0 && (
            <p style={{fontSize:"12px",color:"#3a4f63",padding:"12px 16px",lineHeight:1.6}}>No genres yet.</p>
          )}
          {genres.map(genre=>(
            <div key={genre} style={{position:"relative",display:"flex",alignItems:"center"}}>
              <button onClick={()=>openGenre(genre)} style={{
                flex:1,textAlign:"left",padding:"9px 36px 9px 14px",
                background:activeGenre===genre&&view==="prompts"?"#162030":"transparent",
                color:activeGenre===genre&&view==="prompts"?"#e8f0f8":"#6b8099",
                border:"none",
                borderLeft:`3px solid ${activeGenre===genre&&view==="prompts"?"#d4a017":"transparent"}`,
                cursor:"pointer",fontSize:"13px",fontFamily:"inherit",
                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"
              }}>
                {generating[genre]
                  ? <span style={{color:"#f59e0b"}}>⟳ {genre}</span>
                  : <>{genre} <span style={{float:"right",fontSize:"10px",color:"#3a4f63",marginRight:"4px"}}>{(db[genre]||[]).length}</span></>
                }
              </button>
              <button onClick={()=>handleDeleteGenre(genre)} title="Delete" style={{
                position:"absolute",right:"6px",background:"none",border:"none",
                color:"#3a4f63",cursor:"pointer",fontSize:"15px",padding:"4px",lineHeight:1,
                opacity:0,transition:"opacity 0.15s"
              }}
                onMouseEnter={e=>e.target.style.opacity=1}
                onMouseLeave={e=>e.target.style.opacity=0}
              >×</button>
            </div>
          ))}
        </nav>

        {/* Main */}
        <main style={{flex:1,overflowY:"auto",padding:"32px 36px"}}>
          {error && (
            <div style={{background:"#ef444422",border:"1px solid #ef444444",borderRadius:"7px",padding:"12px 16px",marginBottom:"20px",fontSize:"13px",color:"#ef4444"}}>
              {error}
              <button onClick={()=>setError("")} style={{float:"right",background:"none",border:"none",color:"#ef4444",cursor:"pointer"}}>✕</button>
            </div>
          )}

          {view==="add" && (
            <div style={{maxWidth:"580px"}}>
              <h2 style={{fontSize:"22px",fontWeight:700,color:"#e8f0f8",marginBottom:"6px"}}>Add Genres</h2>
              <p style={{color:"#546a80",fontSize:"13px",lineHeight:1.7,marginBottom:"22px"}}>
                Paste your full genre list — one per line. Claude generates <strong style={{color:"#e8f0f8"}}>20 comprehensive Suno-ready prompts</strong> per genre and saves them permanently to this device.
              </p>
              <textarea
                value={genreInput} onChange={e=>setGenreInput(e.target.value)}
                placeholder={"Lo-Fi Hip Hop\nDark Techno\nDoom Metal\nAfrobeats\nNeo-Soul\n..."}
                rows={10}
                style={{
                  width:"100%",background:"#162030",border:"1px solid #1e2d44",
                  borderRadius:"8px",color:"#ccd8e4",padding:"14px 16px",
                  fontSize:"14px",fontFamily:"'DM Mono',monospace",lineHeight:1.7,
                  resize:"vertical",display:"block",marginBottom:"12px"
                }}
              />
              <div style={{display:"flex",gap:"10px",alignItems:"center",flexWrap:"wrap"}}>
                <button onClick={handleGenerate} disabled={!genreCount||anyGenerating} style={{
                  padding:"11px 26px",borderRadius:"7px",
                  background:genreCount&&!anyGenerating?"#d4a017":"#1a2a3e",
                  color:genreCount&&!anyGenerating?"#fff":"#3a4f63",
                  border:"none",cursor:genreCount&&!anyGenerating?"pointer":"default",
                  fontSize:"13px",fontWeight:700,fontFamily:"inherit"
                }}>Generate &amp; Save All</button>
                <span style={{fontSize:"12px",color:"#3a4f63"}}>{genreCount} genre{genreCount!==1?"s":""} detected</span>
              </div>
            </div>
          )}

          {view==="prompts" && activeGenre && (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"12px",marginBottom:"22px"}}>
                <div>
                  <div style={{fontSize:"10px",color:"#d4a017",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"4px"}}>Genre</div>
                  <h2 style={{fontSize:"26px",fontWeight:700,color:"#e8f0f8",letterSpacing:"-0.5px"}}>{activeGenre}</h2>
                  <div style={{fontSize:"12px",color:"#3a4f63",marginTop:"4px"}}>
                    {filteredPrompts.length} prompt{filteredPrompts.length!==1?"s":""}
                    {filter && ` matching "${filter}"`}
                  </div>
                </div>
                <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                  <button onClick={()=>handleRegenerate(activeGenre)} disabled={generating[activeGenre]} style={{
                    padding:"9px 16px",borderRadius:"7px",background:"#1a2a3e",color:"#9db4c8",
                    border:"1px solid #1e2d44",cursor:"pointer",fontSize:"12px",fontFamily:"inherit",fontWeight:600
                  }}>{generating[activeGenre]?"Regenerating…":"⟳ Regenerate"}</button>
                  <button onClick={()=>{ try{navigator.clipboard.writeText(filteredPrompts.join("\n\n---\n\n"));}catch{} }} style={{
                    padding:"9px 16px",borderRadius:"7px",background:"#1a2a3e",color:"#9db4c8",
                    border:"1px solid #1e2d44",cursor:"pointer",fontSize:"12px",fontFamily:"inherit",fontWeight:600
                  }}>Copy All</button>
                </div>
              </div>
              <input type="text" placeholder="Filter prompts by keyword…"
                value={filter} onChange={e=>setFilter(e.target.value)}
                style={{
                  width:"100%",maxWidth:"380px",background:"#162030",border:"1px solid #1e2535",
                  borderRadius:"7px",color:"#ccd8e4",padding:"9px 14px",fontSize:"13px",
                  fontFamily:"inherit",display:"block",marginBottom:"18px"
                }}
              />
              {generating[activeGenre] ? (
                <div style={{textAlign:"center",padding:"60px 0",color:"#f59e0b",fontSize:"14px"}}>
                  ⟳ Generating 20 prompts for {activeGenre}…
                </div>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
                  {filteredPrompts.map((p,i)=>(
                    <PromptCard key={i} prompt={p} index={i} onCopy={handleCopy} isCopied={copiedText===p}/>
                  ))}
                  {filteredPrompts.length===0&&<p style={{color:"#3a4f63",fontSize:"14px",padding:"20px 0"}}>No prompts match your filter.</p>}
                </div>
              )}
            </div>
          )}

          {view==="lyrics" && (
            <LyricsView
              geminiKey={geminiKey}
              groqKey={groqKey}
              lyricsProvider={lyricsProvider}
              onUpdateKeys={handleUpdateLyricsKeys}
            />
          )}

          {view==="welcome" && (
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"70%",gap:"16px",textAlign:"center"}}>
              {anyGenerating ? (
                <>
                  <div style={{fontSize:"40px",animation:"spin 1.5s linear infinite",display:"inline-block"}}>⟳</div>
                  <div style={{color:"#f59e0b",fontSize:"14px",letterSpacing:"1px"}}>Generating & saving prompts…</div>
                  <div style={{color:"#3a4f63",fontSize:"12px"}}>{Object.entries(generating).filter(([,v])=>v).map(([k])=>k).join(", ")}</div>
                </>
              ) : genres.length > 0 ? (
                <><div style={{fontSize:"40px"}}>🎛️</div><div style={{color:"#546a80",fontSize:"15px"}}>Select a genre from the sidebar</div></>
              ) : (
                <>
                  <div style={{fontSize:"52px"}}>🎵</div>
                  <div style={{fontSize:"20px",fontWeight:700,color:"#e8f0f8"}}>Your prompt library is empty</div>
                  <p style={{color:"#546a80",fontSize:"13px",maxWidth:"360px",lineHeight:1.7}}>
                    Click <strong style={{color:"#d4a017"}}>Add Genres</strong>, paste your list, and Claude will generate 20 rich Suno-ready prompts per genre — saved on this device forever.
                  </p>
                  <button onClick={()=>setView("add")} style={{
                    marginTop:"8px",padding:"11px 28px",borderRadius:"7px",
                    background:"#d4a017",color:"#fff",border:"none",
                    cursor:"pointer",fontSize:"13px",fontWeight:700,fontFamily:"inherit"
                  }}>+ Add Genres</button>
                </>
              )}
            </div>
          )}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- Service Worker Registration -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("SW registered:", reg.scope))
        .catch(err => console.log("SW failed:", err));
    });
  }
</script>
</body>
</html>
